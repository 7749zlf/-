app.security.production-mode=true

spring.datasource.url=${SHORT_VIDEO_DB_URL}
spring.datasource.username=${SHORT_VIDEO_DB_USERNAME}
spring.datasource.password=${SHORT_VIDEO_DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${SHORT_VIDEO_DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${SHORT_VIDEO_DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${SHORT_VIDEO_DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${SHORT_VIDEO_DB_POOL_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.max-lifetime=${SHORT_VIDEO_DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.leak-detection-threshold=${SHORT_VIDEO_DB_POOL_LEAK_DETECTION_MS:0}

app.cors.allowed-origins=${SHORT_VIDEO_CORS_ORIGINS}
app.public-base-url=${SHORT_VIDEO_PUBLIC_BASE_URL}
app.storage.avatar-upload-dir=${SHORT_VIDEO_AVATAR_UPLOAD_DIR}

app.security.bootstrap-admin-username=${SHORT_VIDEO_BOOTSTRAP_ADMIN_USERNAME}
app.security.bootstrap-admin-password=${SHORT_VIDEO_BOOTSTRAP_ADMIN_PASSWORD}
app.security.bootstrap-admin-name=${SHORT_VIDEO_BOOTSTRAP_ADMIN_NAME:Administrator}
app.security.admin-token=${SHORT_VIDEO_ADMIN_TOKEN:}
app.security.payment-callback-token=${SHORT_VIDEO_PAYMENT_CALLBACK_TOKEN}
app.security.data-encryption-key=${SHORT_VIDEO_DATA_ENCRYPTION_KEY}
app.security.admin-login-max-failures=${SHORT_VIDEO_ADMIN_LOGIN_MAX_FAILURES:5}
app.security.admin-login-lockout-minutes=${SHORT_VIDEO_ADMIN_LOGIN_LOCKOUT_MINUTES:10}

app.demo.instant-unlock-enabled=${SHORT_VIDEO_DEMO_INSTANT_UNLOCK_ENABLED:false}
app.demo.recharge-enabled=${SHORT_VIDEO_DEMO_RECHARGE_ENABLED:false}
app.demo.payment-enabled=${SHORT_VIDEO_DEMO_PAYMENT_ENABLED:false}

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.forward-headers-strategy=framework
server.tomcat.connection-timeout=${SHORT_VIDEO_TOMCAT_CONNECTION_TIMEOUT:30s}
server.tomcat.threads.max=${SHORT_VIDEO_TOMCAT_MAX_THREADS:200}
server.tomcat.threads.min-spare=${SHORT_VIDEO_TOMCAT_MIN_SPARE_THREADS:20}
server.tomcat.accept-count=${SHORT_VIDEO_TOMCAT_ACCEPT_COUNT:100}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,application/xml,text/css,text/html,text/plain,image/svg+xml

logging.file.name=${SHORT_VIDEO_LOG_FILE:/data/short-video/logs/backend.log}
logging.logback.rollingpolicy.max-file-size=${SHORT_VIDEO_LOG_MAX_FILE_SIZE:100MB}
logging.logback.rollingpolicy.max-history=${SHORT_VIDEO_LOG_MAX_HISTORY:14}
logging.logback.rollingpolicy.total-size-cap=${SHORT_VIDEO_LOG_TOTAL_SIZE_CAP:2GB}
