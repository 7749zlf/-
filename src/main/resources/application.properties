spring.application.name=short-video-backend
server.port=8081

spring.datasource.url=${SHORT_VIDEO_DB_URL:jdbc:mysql://127.0.0.1:3306/short_video?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SHORT_VIDEO_DB_USERNAME:short_video}
spring.datasource.password=${SHORT_VIDEO_DB_PASSWORD:}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

app.cors.allowed-origins=${SHORT_VIDEO_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.3.132:5173,http://localhost:5174,http://127.0.0.1:5174,http://192.168.3.132:5174,http://localhost:5175,http://127.0.0.1:5175,http://192.168.3.132:5175,http://localhost:5176,http://127.0.0.1:5176,http://192.168.3.132:5176,http://localhost:8080,http://127.0.0.1:8080,http://localhost:8082,http://127.0.0.1:8082}
app.public-base-url=${SHORT_VIDEO_PUBLIC_BASE_URL:http://localhost:8081}
app.storage.avatar-upload-dir=${SHORT_VIDEO_AVATAR_UPLOAD_DIR:uploads/avatars}
app.security.production-mode=${SHORT_VIDEO_PRODUCTION_MODE:false}
app.security.bootstrap-admin-username=${SHORT_VIDEO_BOOTSTRAP_ADMIN_USERNAME:admin}
app.security.bootstrap-admin-password=${SHORT_VIDEO_BOOTSTRAP_ADMIN_PASSWORD:}
app.security.bootstrap-admin-name=${SHORT_VIDEO_BOOTSTRAP_ADMIN_NAME:Administrator}
app.security.admin-token=${SHORT_VIDEO_ADMIN_TOKEN:}
app.security.payment-callback-token=${SHORT_VIDEO_PAYMENT_CALLBACK_TOKEN:}
app.security.data-encryption-key=${SHORT_VIDEO_DATA_ENCRYPTION_KEY:}
app.security.admin-login-max-failures=${SHORT_VIDEO_ADMIN_LOGIN_MAX_FAILURES:5}
app.security.admin-login-lockout-minutes=${SHORT_VIDEO_ADMIN_LOGIN_LOCKOUT_MINUTES:10}

app.demo.instant-unlock-enabled=${SHORT_VIDEO_DEMO_INSTANT_UNLOCK_ENABLED:true}
app.demo.recharge-enabled=${SHORT_VIDEO_DEMO_RECHARGE_ENABLED:true}
app.demo.payment-enabled=${SHORT_VIDEO_DEMO_PAYMENT_ENABLED:true}
